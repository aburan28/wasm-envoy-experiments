name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: grpc-proto-extract
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: grpc-proto-extract
      - run: cargo fmt --check
      - run: cargo clippy --target wasm32-unknown-unknown -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: grpc-proto-extract
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: grpc-proto-extract
      - run: cargo test

  build:
    name: Build WASM
    runs-on: ubuntu-latest
    needs: [lint, test]
    defaults:
      run:
        working-directory: grpc-proto-extract
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: grpc-proto-extract
      - run: cargo build --target wasm32-unknown-unknown --release
      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: grpc-proto-extract-wasm
          path: grpc-proto-extract/target/wasm32-unknown-unknown/release/grpc_proto_extract.wasm
          retention-days: 30
